<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNBT Master: Persamaan Garis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            options: {
                enableMenu: false
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8fafc; 
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            line-height: 1.6;
        }
        .option-input:checked + .option-card { 
            border-color: #4f46e5; 
            background-color: #f5f7ff; 
            box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.1);
        }
        .option-input:checked + .option-card .option-marker {
            background-color: #4f46e5;
            color: white;
            border-color: #4f46e5;
        }
        #modal-overlay { backdrop-filter: blur(8px); display: none; }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }
        .animate-shake { animation: shake 0.2s ease-in-out 0s 2; }
        
        .math-text { font-size: 1.05em; }
    </style>
</head>
<body class="min-h-screen text-slate-900" oncontextmenu="return false;">

    <!-- Navbar -->
    <nav class="bg-white/90 backdrop-blur-md border-b border-slate-200 sticky top-0 z-50 px-4 py-3">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="bg-indigo-600 p-2 rounded-xl shadow-lg shadow-indigo-100">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
                </div>
                <h1 class="font-extrabold text-lg tracking-tight">SNBT Master</h1>
            </div>
            <div id="quiz-meta" class="hidden flex items-center space-x-4">
                <div id="violation-badge" class="hidden flex items-center space-x-2 bg-rose-50 border border-rose-100 px-3 py-1 rounded-full">
                    <span class="text-[10px] font-bold text-rose-600 uppercase tracking-tighter">Pelanggaran: <span id="violation-count">0</span>/1</span>
                </div>
                <div class="bg-slate-900 px-4 py-1.5 rounded-xl">
                    <span id="time" class="font-mono font-bold text-white text-sm">10:00</span>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-4 md:p-8">
        <!-- Landing Section -->
        <div id="landingSection" class="max-w-xl mx-auto bg-white rounded-[2rem] shadow-xl overflow-hidden border border-slate-100 mt-4 md:mt-10">
            <div class="bg-indigo-600 p-8 md:p-12 text-white text-center relative">
                <h2 class="text-3xl font-black mb-2 uppercase tracking-tight relative z-10">Latihan Persamaan Garis</h2>
                <p class="text-indigo-100 opacity-90 italic text-sm md:text-base">Topik: Persamaan Garis Lurus (MOTS)</p>
            </div>
            <div class="p-8 md:p-10 space-y-8">
                <div class="space-y-4">
                    <label class="block text-xs font-black text-slate-400 uppercase tracking-widest ml-1">Nama Lengkap Peserta</label>
                    <input type="text" id="userName" class="w-full px-6 py-4 bg-slate-50 border-2 border-slate-100 rounded-2xl focus:border-indigo-500 focus:bg-white outline-none transition-all font-bold text-slate-800" placeholder="Masukkan nama Anda...">
                </div>
                <button onclick="mulaiKuis()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-black py-5 rounded-2xl transition-all shadow-lg shadow-indigo-100 uppercase tracking-widest text-sm transform active:scale-95">
                    Mulai Sesi Ujian
                </button>
            </div>
        </div>

        <!-- Loading Section -->
        <div id="loadingSection" class="hidden flex flex-col items-center justify-center min-h-[50vh] space-y-4">
            <div class="w-10 h-10 border-4 border-slate-200 border-t-indigo-600 rounded-full animate-spin"></div>
            <p class="font-bold text-slate-400 text-sm">Sedang memproses data...</p>
        </div>

        <!-- Quiz Section -->
        <div id="quizSection" class="hidden space-y-8 max-w-3xl mx-auto">
            <div id="isiSoal" class="space-y-6 pb-28"></div>
            
            <div class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md border-t border-slate-200 p-4 z-40">
                <div class="max-w-3xl mx-auto">
                    <button onclick="tampilkanKonfirmasiSelesai()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-black py-4 rounded-xl shadow-lg transition-all uppercase tracking-widest text-sm transform active:scale-95">
                        Kirim Jawaban Akhir
                    </button>
                </div>
            </div>
        </div>

        <!-- Result Section -->
        <div id="resultSection" class="hidden max-w-2xl mx-auto space-y-8 text-center animate-in fade-in slide-in-from-bottom-8 duration-700 pb-20">
            <div class="space-y-2">
                <h2 class="text-3xl font-extrabold text-slate-800 uppercase tracking-tight">Hasil Latihan</h2>
                <p class="text-slate-500">Selamat <strong id="resNama" class="text-slate-900">Peserta</strong>, Anda telah menyelesaikan kuis!</p>
            </div>
            
            <div id="displaySkor" class="text-[120px] md:text-[160px] font-black text-rose-500 leading-none py-4 drop-shadow-sm">0</div>

            <div class="bg-white rounded-[1.5rem] border-l-[6px] border-indigo-500 p-6 md:p-8 text-left shadow-sm border border-slate-100">
                <div class="space-y-6">
                    <div id="cheat-notice-text" class="hidden p-3 bg-rose-50 border border-rose-100 text-rose-600 rounded-xl text-center font-bold text-xs uppercase tracking-widest">
                        ⚠️ Terdeteksi Keluar dari Halaman Ujian
                    </div>
                    
                    <div class="flex items-start">
                        <div class="mt-1 mr-4 bg-emerald-100 text-emerald-600 p-1.5 rounded-lg shrink-0">
                            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"></path></svg>
                        </div>
                        <div>
                            <p class="font-black text-slate-400 uppercase text-[10px] tracking-widest mb-1">Jawaban Benar</p>
                            <p id="listBenar" class="text-slate-700 font-bold text-base leading-relaxed break-words">Memuat...</p>
                        </div>
                    </div>

                    <div class="flex items-start">
                        <div class="mt-1 mr-4 bg-rose-100 text-rose-600 p-1.5 rounded-lg shrink-0">
                            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"></path></svg>
                        </div>
                        <div>
                            <p class="font-black text-slate-400 uppercase text-[10px] tracking-widest mb-1">Jawaban Salah</p>
                            <p id="listSalah" class="text-slate-700 font-bold text-base leading-relaxed break-words">Memuat...</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="pt-4">
                <button onclick="location.reload()" class="bg-slate-900 text-white font-bold py-4 px-12 rounded-full hover:bg-black transition-all shadow-lg uppercase tracking-widest text-xs">Ulangi Kuis</button>
            </div>
        </div>
    </main>

    <!-- Modal System -->
    <div id="modal-overlay" class="fixed inset-0 bg-slate-900/60 z-[100] flex items-center justify-center p-6">
        <div class="bg-white rounded-[2rem] max-w-sm w-full p-10 shadow-2xl">
            <h3 id="modal-title" class="text-xl font-bold text-center mb-3 tracking-tight"></h3>
            <p id="modal-desc" class="text-slate-500 text-center mb-10 text-sm leading-relaxed"></p>
            <div class="space-y-3">
                <button id="modal-btn-primary" class="w-full py-4 rounded-2xl font-bold text-white bg-indigo-600 shadow-md transform active:scale-95 transition-all text-xs uppercase tracking-widest"></button>
                <button id="modal-btn-secondary" class="w-full py-3 text-slate-400 font-bold text-[10px] uppercase tracking-widest hidden"></button>
            </div>
        </div>
    </div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbywyHlpGKNBoj1vAOgMkrqlWdCJ3ZQG8dmAU1e2h9KUxMb8yJy9Qe1btYBG3JpzVZ2aTQ/exec";

    const soalData = [
        { q: "Persamaan garis yang melalui titik $(1,-2)$ dan tegak lurus dengan garis $2x-3y+6=0$ adalah ...", a: ["$3x+2y+1=0$", "$3x-2y-7=0$", "$2x+3y+4=0$", "$2x-3y-8=0$", "$3x+2y-1=0$"], k: 0 },
        { q: "Sebuah garis $g$ melalui titik potong garis $x-y=1$ dan $2x+y=5$. Jika garis $g$ juga melalui titik pusat $(0,0)$, maka persamaan garis $g$ adalah ...", a: ["$y=2x$", "$y=\\frac{1}{2}x$", "$y=-2x$", "$y=-\\frac{1}{2}x$", "$x+y=0$"], k: 1 },
        { q: "Garis $l$ melalui titik $(-2, 4)$ dan sejajar dengan garis yang persamaannya $3x+y-5=0$. Persamaan garis $l$ adalah ...", a: ["$3x-y+10=0$", "$3x+y+2=0$", "$x-3y+14=0$", "$3x+y-2=0$", "$x+3y-10=0$"], k: 1 },
        { q: "Luas segitiga yang dibentuk oleh garis $3x+4y=12$, sumbu-$X$, dan sumbu-$Y$ adalah ... satuan luas.", a: ["3", "4", "6", "12", "24"], k: 2 },
        { q: "Diketahui titik $A(1,2)$ dan $B(5,6)$. Persamaan garis yang melalui titik tengah $AB$ dan memiliki gradien $-1$ adalah ...", a: ["$y=-x+7$", "$y=-x+4$", "$y=-x+1$", "$y=-x+11$", "$y=-x+3$"], k: 0 },
        { q: "Jika garis $y=(k-2)x+5$ tegak lurus dengan garis $y=\\frac{1}{3}x-2$, maka nilai $k$ adalah ...", a: ["-1", "1", "3", "5", "0"], k: 0 },
        { q: "Titik $(1, 2)$, $(3, 4)$, dan $(k, 8)$ terletak pada satu garis lurus yang sama. Nilai $k$ adalah ...", a: ["5", "6", "7", "8", "9"], k: 2 },
        { q: "Garis $k$ sejajar dengan garis $l$ yang memiliki persamaan $y=2x-1$. Jika garis $k$ melalui titik $(3,2)$, maka titik potong garis $k$ dengan sumbu-$X$ adalah ...", a: ["(2,0)", "(0,2)", "(-2,0)", "(4,0)", "(0,-4)"], k: 0 },
        { q: "Persamaan garis yang melalui titik $(2, 3)$ dan tegak lurus dengan garis yang melalui titik $(1,1)$ dan $(3,5)$ adalah ...", a: ["$x+2y-8=0$", "$2x+y-7=0$", "$x-2y+4=0$", "$2x-y-1=0$", "$x+2y-4=0$"], k: 0 },
        { q: "Garis $y=ax+b$ mencerminkan garis $y=3x+2$ terhadap garis $y=x$. Nilai $a+b$ adalah ...", a: ["$-1/3$", "1", "-1", "$2/3$", "5"], k: 0 }
    ];

    let timer;
    let quizActive = false;
    let userHasCheated = false;
    let answers = Array(soalData.length).fill(null);

    function showModal({ title, desc, btnPrimary, btnSecondary, onConfirm }) {
        const overlay = document.getElementById('modal-overlay');
        document.getElementById('modal-title').innerText = title;
        document.getElementById('modal-desc').innerText = desc;
        const b1 = document.getElementById('modal-btn-primary');
        b1.innerText = btnPrimary.text;
        b1.onclick = () => { overlay.style.display = 'none'; if(onConfirm) onConfirm(); };
        const b2 = document.getElementById('modal-btn-secondary');
        if (btnSecondary) {
            b2.innerText = btnSecondary.text;
            b2.classList.remove('hidden');
            b2.onclick = () => { overlay.style.display = 'none'; };
        } else { b2.classList.add('hidden'); }
        overlay.style.display = 'flex';
    }

    function handleViolation() {
        if (!quizActive || userHasCheated) return;
        userHasCheated = true;
        document.getElementById('violation-count').innerText = "1";
        document.getElementById('violation-badge').classList.remove('hidden');
        document.getElementById('violation-badge').classList.add('animate-shake');
        
        hitungDanTampilkanHasil(); 
        
        showModal({ 
            title: "SESI TERKUNCI", 
            desc: "Anda terdeteksi meninggalkan halaman ujian. Sesuai sistem keamanan SNBT Master, sesi Anda dihentikan secara otomatis.", 
            btnPrimary: { text: "LIHAT HASIL AKHIR" } 
        });
    }

    window.onblur = handleViolation;
    document.addEventListener("visibilitychange", () => {
        if (document.visibilityState === 'hidden') handleViolation();
    });

    function mulaiKuis() {
        const name = document.getElementById('userName').value.trim();
        if (!name) {
            showModal({ title: "Nama Diperlukan", desc: "Harap masukkan nama lengkap Anda untuk memulai sesi latihan kuis.", btnPrimary: { text: "MENGERTI" } });
            return;
        }
        document.getElementById('landingSection').classList.add('hidden');
        document.getElementById('quizSection').classList.remove('hidden');
        document.getElementById('quiz-meta').classList.remove('hidden');
        quizActive = true;
        renderSoal();
        startTimer();
    }

    function renderSoal() {
        let html = "";
        soalData.forEach((s, i) => {
            html += `
                <div class="bg-white p-6 md:p-10 rounded-[2rem] border border-slate-200 shadow-sm overflow-hidden">
                    <div class="flex items-start mb-6">
                        <span class="bg-indigo-600 text-white w-8 h-8 flex items-center justify-center rounded-lg font-black mr-4 shrink-0 text-xs shadow-md shadow-indigo-100">${i+1}</span>
                        <div class="text-slate-800 font-bold text-lg leading-relaxed math-text">${s.q}</div>
                    </div>
                    <div class="grid grid-cols-1 gap-3 ml-0 md:ml-12">
                        ${s.a.map((opt, idx) => `
                            <label class="block cursor-pointer group">
                                <input type="radio" name="q${i}" value="${idx}" class="option-input hidden" onchange="answers[${i}]=${idx}">
                                <div class="option-card border-2 border-slate-100 rounded-xl p-4 flex items-center transition-all group-hover:border-indigo-100">
                                    <span class="option-marker w-8 h-8 flex items-center justify-center border-2 border-slate-100 rounded-lg text-[10px] font-black mr-4 text-slate-300 bg-white transition-all uppercase">${String.fromCharCode(65+idx)}</span>
                                    <span class="text-slate-600 font-semibold text-base">${opt}</span>
                                </div>
                            </label>
                        `).join('')}
                    </div>
                </div>
            `;
        });
        document.getElementById('isiSoal').innerHTML = html;
        if (window.MathJax) MathJax.typesetPromise();
    }

    function startTimer() {
        let timeLeft = 600;
        timer = setInterval(() => {
            timeLeft--;
            let min = Math.floor(timeLeft / 60);
            let sec = timeLeft % 60;
            document.getElementById('time').innerText = `${min}:${sec < 10 ? '0'+sec : sec}`;
            if (timeLeft <= 0) hitungDanTampilkanHasil();
        }, 1000);
    }

    function tampilkanKonfirmasiSelesai() {
        const unsolved = answers.filter(a => a === null).length;
        const msg = unsolved > 0 ? `Anda masih menyisakan ${unsolved} soal yang belum terjawab. Yakin ingin mengirimkan sekarang?` : "Pastikan Anda sudah meneliti semua jawaban Anda.";
        
        showModal({
            title: "Akhiri Ujian?",
            desc: msg,
            btnPrimary: { text: "YA, KIRIM DATA" },
            btnSecondary: { text: "BATAL" },
            onConfirm: () => hitungDanTampilkanHasil()
        });
    }

    async function hitungDanTampilkanHasil() {
        clearInterval(timer);
        quizActive = false;
        window.onblur = null; 

        document.getElementById('quizSection').classList.add('hidden');
        document.getElementById('loadingSection').classList.remove('hidden');

        let nomorBenar = [], nomorSalah = [];
        soalData.forEach((s, i) => {
            if (answers[i] === s.k) nomorBenar.push(i + 1);
            else nomorSalah.push(i + 1);
        });

        const skor = Math.round((nomorBenar.length / soalData.length) * 100);
        const namaSiswa = document.getElementById('userName').value;
        const statusFinal = userHasCheated ? "CURANG" : "OK";
        
        const benarListString = nomorBenar.length > 0 ? nomorBenar.join(', ') : "Tidak ada";
        const salahListString = nomorSalah.length > 0 ? nomorSalah.join(', ') : "Tidak ada";

        try {
            await fetch(SCRIPT_URL, {
                method: "POST", 
                mode: "no-cors",
                body: JSON.stringify({ 
                    nama: namaSiswa, 
                    skor: skor, 
                    status: statusFinal,
                    noBenar: benarListString,
                    noSalah: salahListString
                })
            });
        } catch (e) { console.error(e); }

        setTimeout(() => {
            document.getElementById('loadingSection').classList.add('hidden');
            document.getElementById('resultSection').classList.remove('hidden');
            document.getElementById('displaySkor').innerText = skor;
            document.getElementById('resNama').innerText = namaSiswa;
            
            document.getElementById('listBenar').innerText = benarListString;
            document.getElementById('listSalah').innerText = salahListString;

            if(userHasCheated) {
                document.getElementById('cheat-notice-text').classList.remove('hidden');
                document.getElementById('displaySkor').classList.replace('text-rose-500', 'text-slate-400');
            }
            if (window.MathJax) MathJax.typesetPromise();
        }, 800);
    }
</script>
</body>
</html>
